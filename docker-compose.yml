version: '3.8'

services:
  bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: gravity-claw-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./.data:/app/.data

  mission-control:
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    container_name: gravity-claw-ui
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./.data:/.data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
