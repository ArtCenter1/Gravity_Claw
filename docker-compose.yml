version: '3.8'

services:
  bot:
    image: gravity-claw-bot:0.1.0
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: gravity-claw-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./.data:/app/.data
      - ./skills:/app/skills
      - ./mcp_servers.json:/app/mcp_servers.json
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - openspace-global_default

  mission-control:
    image: gravity-claw-ui:0.1.0
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    container_name: gravity-claw-ui
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./.data:/.data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: gravity_claw_default
  openspace-global_default:
    external: true
